name: Auto Update Mark Six

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install requests beautifulsoup4 pandas openpyxl
    - run: python fetch_marksix.py
    - run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add data.xlsx
        git commit -m "Auto update Mark Six data" || echo "No changes"
        git push
