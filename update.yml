name: Auto Update Mark Six Data

on:
  schedule:
    - cron: "30 14 * * *"  # 22:30 HKT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Fetch latest Mark Six results
        run: |
          python fetch_marksix.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data.xlsx
          git commit -m "Auto update Mark Six data" || echo "No changes to commit"
          git push
